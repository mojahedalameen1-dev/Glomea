name: kidneytrack_mobile
description: "A new Flutter project for KidneyTrack."
publish_to: 'none'
version: 0.2.1+2100

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_dotenv: ^5.1.0
  go_router: ^13.2.0
  fl_chart: ^0.68.0
  flutter_local_notifications: ^17.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.10+1
  intl: ^0.20.2
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  auto_size_text: ^3.0.0
  gap: ^3.0.1
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.12.0
  google_mlkit_barcode_scanning: ^0.13.0
  camera: ^0.11.0
  google_mlkit_document_scanner: ^0.4.1
  google_mlkit_text_recognition: ^0.14.0
  permission_handler: ^11.3.0
  dio: ^5.4.0
  shared_preferences: ^2.2.3
  timezone: ^0.9.3
  google_generative_ai: ^0.4.5
  gemini_nano_android: ^0.1.0
  mobile_scanner: ^5.1.0
  image_picker: ^1.1.2
  uuid: ^4.5.3
  lucide_icons: ^0.257.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  integration_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/logo_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - assets/icons/3d/
    - assets/lottie/
    - assets/animations/
    - .env


  fonts:
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
