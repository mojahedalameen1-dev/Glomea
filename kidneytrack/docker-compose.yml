version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kidneytrack_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: kidneytrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kidneytrack_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: kidneytrack_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/kidneytrack_db?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - PORT=3000
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env

volumes:
  postgres_data:
